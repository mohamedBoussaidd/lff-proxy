name: deploy lff proxy

on:
  push:
    branches:
      - main

env:
  IMAGE: lff-proxy

jobs:
  create-folder:
    name: create folder
    runs-on: ubuntu-latest
    steps:
      - name: execute commands
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p /opt/applications/lff/${{ env.IMAGE }}

  run-container:
    name: run container
    runs-on: ubuntu-latest
    needs: ['create-folder']
    steps:
      - name: cloner le repertoire
        uses: actions/checkout@v3

      - name: copy file via ssh key
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          source: "compose.yml,api-lff.conf,web-lff.conf"
          target: /opt/applications/lff/${{ env.IMAGE }}

      - name: deploy et reload nginx
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/applications/lff/${{ env.IMAGE }}
            docker-compose up -d
            docker-compose exec -T proxy nginx -t && docker-compose exec -T proxy nginx -s reload
