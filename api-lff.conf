# Zone stricte pour les routes d'authentification publiques (5 req/min par IP)
limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;

server {
        listen 80;
        server_name api.lff.simplefacture.fr;

        return 301 https://$host$request_uri;
    }
server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        # listen 443 ssl;
        server_name api.lff.simplefacture.fr;

        client_max_body_size 10M;

        ssl_certificate /etc/letsencrypt/live/api.lff.simplefacture.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.lff.simplefacture.fr/privkey.pem;
        # Sécurité SSL recommandée (optionnel)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Activer ModSecurity pour ce serveur
        # modsecurity on;
        # modsecurity_rules_file /etc/nginx/modsecurity.conf;

        # === GATEWAY (n8n + consultation PDF) ===
        location = /clients {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /invoices {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /confirm {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /invoice {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /devis {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location ^~ /devis/view/ {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /invoice/send-email {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /devis/send-email {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location ^~ /invoice/view/ {
            proxy_pass http://lafacturefacile-agent-gateway:8082;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        # === ROUTES SENSIBLES — rate limiting strict (5 req/min par IP) ===
        location = /connexion {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /addUser {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /modifyPassword {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /newPassword {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }
        location = /activation {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

        # Bloquer l'accès direct aux routes agent depuis l'extérieur
        # Le gateway appelle le backend en interne (Docker network), pas via nginx
        location ^~ /agent/ {
            deny all;
        }

        # === BACKEND (tout le reste) ===
        location / {
            limit_req zone=req_limit_per_ip burst=10 nodelay;
            proxy_pass http://lafacturefacile-backend:8081;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
        }

}